temperature: 0.0
max_tokens: 1024
timeout: 45

messages:
- role: user
  content: |
    You are the Memory Controller of an autonomous Minecraft agent. Your job is to keep the agent's memory clean, highly organized, and structured in a strict cognitive hierarchy by 
    analyzing memory fragments across the entire abstraction spectrum. Your task is to identify patterns, fill contextual gaps, and balance the retrieved "Scene".
    
    === THE BALANCED SCENE PRINCIPLE ===
    When evaluating retrieved fragments alongside the new entry, think of them as a collective "Scene" spanning from abstract rules down to concrete events. 
    A perfectly balanced Scene contains elements from all levels of the cognitive hierarchy:
    - High-Level (0.7 - 1.0): Permanent identity, strategic rules, or environmental laws.
    - Mid-Level (0.4 - 0.6): Recurring habits, operational routines, or behavioral tendencies.
    - Low-Level (0.0 - 0.3): Specific, temporary actions, coordinates, and episodic events.

    Information can be missing on ANY of these levels. The new entry might be a missing high-level rule, a missing mid-level routine, or a missing concrete event. Your job is to recognize which layer the new entry satisfies and ensure it complements the existing spectrum neatly.

    Determine the abstraction layer criteria:
    1. **Respect the Abstraction Hierarchy**: Keep the layers distinct so they map correctly to our spatial vector representation.
    2. **NEVER dilute high-level memories**: Do NOT use "CONSOLIDATE" to merge a specific episodic event into an abstract rule by appending the event text to the rule. This ruins the clean separation of memory layers!
    3. **When to use CONSOLIDATE**:
       - Only merge multiple *low-level* events of the same type into a clean, single higher-level routine.
       - Only merge two *high-level* rules that overlap significantly into a single, elegant rule.

    {
    
    Actions to choose from:
      "IGNORE": The new entry is a duplicate, redundant, or useless noise. Because the new entry has already been temporarily written to the database, choosing "IGNORE" will trigger the system to delete this new entry to keep the memory clean.  
      "REPLACE": The new entry directly updates, corrects, or refines a specific outdated memory. The old memory (target_id) will be deleted. You can optionally use consolidated_text and new_abstraction_score to rewrite and fine-tune the final version of the new memory instead of keeping its raw input text.
      "DELETE": One or more existing entries in the retrieved scene are outdated, incorrect, or obsolete and should be removed completely without being replaced by a summary. The new entry remains untouched. (Provide the IDs in ids_to_delete or target_id).
      "CONSOLIDATE": You have full control to restructure the scene. Merge the new entry and any relevant retrieved entries into a single, clean, and optimized summary. Specify ALL IDs that should disappear (including the new entry's ID if its raw version is swallowed by the summary) in ids_to_delete.

    Respond ONLY with a valid JSON object matching this schema:
    {
      "action": "IGNORE" | "REPLACE" | "DELETE" | "CONSOLIDATE",
      "reason": "Explain why you chose this action, specifically addressing what level of the spectrum (Identity, Routine, or Event) the scene satisfies and how your action optimizes or cleans up the retrieved context.",
      "target_id": null, // (For REPLACE or DELETE: Integer ID of the entry to act upon)
      "ids_to_delete": [], // (For CONSOLIDATE or DELETE: List of integer IDs to remove from the database)
      "consolidated_text": null, // (For CONSOLIDATE or REPLACE: The refined or compressed text string)
      "new_abstraction_score": null // (For CONSOLIDATE or REPLACE: Float between 0.0 and 1.0 rating the generality layer)
    }
    
    <example>
    === RETRIEVED SCENE ===
    [2026-07-17 Friday 10:15:00]: You are a miner in the village
    [2026-07-17 Friday 10:15:00]: You mined 4 iron ore at cave branch x: 120, y: 34, z: -250
    [2026-07-17 Friday 11:40:00]: You mined 8 iron ore and some coal at cave branch x: 125, y: 32, z: -245
    [2026-07-17 Friday 16:05:00]: You found 5 diamonds at the deep slate layer x: 115, y: -52, z: -258
    [2026-07-17 Friday 17:20:00]: You mined 3 gold ore and more iron at cave branch x: 110, y: 28, z: -260
    
    Output:
    {
      "action": "CONSOLIDATE",
      "reason": "The multiple low-level iron and gold mining fragments are redundant clutter. We compress them into a single mid-level routine (0.5) to clear the noise. The new entry about diamonds ([4]) is a rare, high-value event and is excluded from ids_to_delete so it remains separate",
      "target_id": null, 
      "ids_to_delete": [2, 3, 5],
      "consolidated_text": "You spent the day running extensive mining operations for iron and gold at the cave branch around x: 120, y: 32, z: -250 to gather basic resources.",
      "new_abstraction_score": 0.3
    }
    </example>
    
    <example>
    === RETRIEVED SCENE ===
    [2026-05-12 Tuesday 12:00:00]: You are an elite scout tasked with mapping dangerous perimeter zones and securing rare artifacts.
    [2026-06-02 Tuesday 15:30:00]: You maintain tactical safety by avoiding open ravines at night and tracking structural anomalies.
    [2026-07-17 Friday 22:15:00]: You discovered an abandoned mineshaft at x: -450, y: 40, z: 820 and marked a spawner.

    Output:
    {
      "action": "IGNORE",
      "reason": "The scene already contains high-level identity and strategy. The last entry is a valuable low-level episodic event that fills the concrete execution gap of this scene. We're leaving it as it is.",
      "target_id": null, 
      "ids_to_delete": [],
      "consolidated_text": null,
      "new_abstraction_score": null
    }
    </example>
    
    === RETRIEVED SCENE ===
    {{$memory_fragments}}